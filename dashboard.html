!DOCTYPE html>
<html>
<head>
    <title>Insider Threat Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; font-family: 'Roboto', sans-serif; }
        html, body { height:100%; width:100%; overflow-x:hidden; background:#111; }

        canvas#bgCanvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }

        h1,h2 { text-align:center; color:#0ff; text-shadow:0 0 8px #0ff; }

        .alert-box { text-align:center; color:#ff4c4c; font-weight:bold; margin: 10px; text-shadow: 0 0 5px black; }

        /* Table styling */
        .table-container {
            width: 80%;
            max-height: 500px; /* scrollable */
            overflow-y: auto;
            margin: 20px auto;
            background: rgba(0,0,0,0.75);
            border-radius: 12px;
            padding:10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color:#fff;
            font-size:18px;
        }
        th, td {
            border:1px solid #0ff;
            padding:12px 15px;
            text-align:center;
        }
        th { background: rgba(0,255,255,0.2); }
        td a { color:#0ff; text-decoration: underline; }
        td:hover { background: rgba(0,255,255,0.1); }

        /* Chart styling */
        .chart-container {
            width: 90%;
            max-width:1200px;
            margin: 50px auto 100px auto;
            background: rgba(0,0,0,0.2);
            padding:20px;
            border-radius:12px;
        }
        canvas#riskChart { width: 100% !important; height:400px !important; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<h1>Insider Threat Monitoring Dashboard</h1>
<div class="alert-box">⚠️ High Risk Employees: John Doe, Sara Connor, Mike Brown</div>

<!-- Scrollable table -->
<div class="table-container">
    <table>
        <thead>
            <tr><th>Employee Name</th><th>IP Address</th><th>Risk Score</th><th>Risk Level</th></tr>
        </thead>
        <tbody id="employeeTable"></tbody>
    </table>
</div>

<!-- Chart at bottom -->
<div class="chart-container">
    <h2>Employee Risk Score Analysis</h2>
    <canvas id="riskChart"></canvas>
</div>

<script>
// 30 Employees data
const employees = [
    { name: "John Doe", ip: "192.168.1.10", risk: 75, level: "High", activity: ["Accessed confidential file","Late night login"] },
    { name: "Jane Smith", ip: "192.168.1.12", risk: 40, level: "Medium", activity: ["Failed login attempts"] },
    { name: "Alice Lee", ip: "192.168.1.15", risk: 20, level: "Low", activity: ["Normal activity"] },
    { name: "Bob Martin", ip: "192.168.1.18", risk: 55, level: "Medium", activity: ["Downloaded sensitive data"] },
    { name: "Sara Connor", ip: "192.168.1.22", risk: 80, level: "High", activity: ["Late night login","Unauthorized USB access"] },
    { name: "Tom Hanks", ip: "192.168.1.25", risk: 35, level: "Low", activity: ["Normal activity"] },
    { name: "Emma Stone", ip: "192.168.1.28", risk: 45, level: "Medium", activity: ["Multiple failed login attempts"] },
    { name: "Chris Evans", ip: "192.168.1.30", risk: 65, level: "High", activity: ["Accessed restricted folder"] },
    { name: "Natalie Portman", ip: "192.168.1.33", risk: 30, level: "Low", activity: ["Normal activity"] },
    { name: "Robert Downey", ip: "192.168.1.35", risk: 50, level: "Medium", activity: ["Copied sensitive file"] },
    { name: "Scarlett Johansson", ip: "192.168.1.38", risk: 70, level: "High", activity: ["Unauthorized USB access"] },
    { name: "Mark Ruffalo", ip: "192.168.1.40", risk: 25, level: "Low", activity: ["Normal activity"] },
    { name: "Chris Hemsworth", ip: "192.168.1.42", risk: 60, level: "Medium", activity: ["Accessed HR folder"] },
    { name: "Jeremy Renner", ip: "192.168.1.45", risk: 35, level: "Low", activity: ["Normal activity"] },
    { name: "Paul Rudd", ip: "192.168.1.48", risk: 55, level: "Medium", activity: ["Downloaded restricted file"] },
    { name: "Elizabeth Olsen", ip: "192.168.1.50", risk: 75, level: "High", activity: ["Accessed confidential project"] },
    { name: "Benedict Cumberbatch", ip: "192.168.1.53", risk: 40, level: "Medium", activity: ["Failed login attempts"] },
    { name: "Tom Holland", ip: "192.168.1.55", risk: 30, level: "Low", activity: ["Normal activity"] },
    { name: "Chadwick Boseman", ip: "192.168.1.58", risk: 65, level: "High", activity: ["Unauthorized USB"] },
    { name: "Brie Larson", ip: "192.168.1.60", risk: 45, level: "Medium", activity: ["Multiple failed logins"] },
    { name: "Anthony Mackie", ip: "192.168.1.63", risk: 50, level: "Medium", activity: ["Accessed sensitive report"] },
    { name: "Sebastian Stan", ip: "192.168.1.65", risk: 35, level: "Low", activity: ["Normal activity"] },
    { name: "Elizabeth Banks", ip: "192.168.1.68", risk: 25, level: "Low", activity: ["Normal activity"] },
    { name: "Josh Brolin", ip: "192.168.1.70", risk: 70, level: "High", activity: ["Accessed financial file"] },
    { name: "Gwyneth Paltrow", ip: "192.168.1.73", risk: 55, level: "Medium", activity: ["Downloaded restricted file"] },
    { name: "Paul Bettany", ip: "192.168.1.75", risk: 40, level: "Medium", activity: ["Failed login attempts"] },
    { name: "Karen Gillan", ip: "192.168.1.78", risk: 30, level: "Low", activity: ["Normal activity"] },
    { name: "Dave Bautista", ip: "192.168.1.80", risk: 60, level: "Medium", activity: ["Accessed HR folder"] },
    { name: "Pom Klementieff", ip: "192.168.1.83", risk: 20, level: "Low", activity: ["Normal activity"] },
    { name: "Vin Diesel", ip: "192.168.1.85", risk: 75, level: "High", activity: ["Unauthorized USB","Late night login"] },
    { name: "Michelle Rodriguez", ip: "192.168.1.88", risk: 45, level: "Medium", activity: ["Failed login attempts"] }
];

const table = document.getElementById("employeeTable");
const names = [];
const risks = [];

employees.forEach(emp => {
    const row = document.createElement("tr");
    const nameCell = document.createElement("td");
    const nameLink = document.createElement("a");
    nameLink.textContent = emp.name;
    nameLink.href = `employee.html?name=${encodeURIComponent(emp.name)}&ip=${encodeURIComponent(emp.ip)}&risk=${emp.risk}&activity=${encodeURIComponent(emp.activity.join('|'))}`;
    nameCell.appendChild(nameLink); row.appendChild(nameCell);

    const ipCell = document.createElement("td"); ipCell.textContent = emp.ip; row.appendChild(ipCell);
    const riskCell = document.createElement("td"); riskCell.textContent = emp.risk; row.appendChild(riskCell);
    const levelCell = document.createElement("td"); levelCell.textContent = emp.level; row.appendChild(levelCell);

    table.appendChild(row);
    names.push(emp.name);
    risks.push(emp.risk);
});

// Chart with bigger labels
new Chart(document.getElementById('riskChart'), {
    type:'bar',
    data:{
        labels:names,
        datasets:[{
            label:'Risk Score',
            data:risks,
            backgroundColor:risks.map(score => score>=70?'red':score>=40?'orange':'green'),
            borderWidth: 1
        }]
    },
    options:{
        plugins: {
            legend: { labels: { font: { size: 20 } } },
            tooltip: { bodyFont: { size: 18 }, titleFont: { size: 20 } }
        },
        scales:{
            y:{ beginAtZero:true, max:100, ticks:{ font:{ size:18 } }, title:{ display:true, text:'Risk Score', font:{ size:20 } } },
            x:{ ticks:{ font:{ size:18 } }, title:{ display:true, text:'Employees', font:{ size:20 } } }
        }
    }
});

// Animated background
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const squares = [];
for(let i=0;i<60;i++){
    squares.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*5+2,
        vx: (Math.random()-0.5)*0.8,
        vy: (Math.random()-0.5)*0.8,
        color:`rgba(0,255,255,${Math.random()*0.5+0.3})`
    });
}
function drawSquares(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let sq of squares){
        ctx.fillStyle = sq.color;
        ctx.fillRect(sq.x,sq.y,sq.size,sq.size);
        sq.x+=sq.vx; sq.y+=sq.vy;
        if(sq.x<0||sq.x>canvas.width) sq.vx*=-1;
        if(sq.y<0||sq.y>canvas.height) sq.vy*=-1;
    }
    requestAnimationFrame(drawSquares);
}
drawSquares();
window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

</script>
</body>
</html>
