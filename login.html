<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Login - Insider Threat Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Reset */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }

html, body {
    height: 100%;
    overflow: hidden;
}

/* Canvas background fills screen */
#bgCanvas {
    position: fixed;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Centered flex container */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000; /* fallback */
}

/* Login card */
.login-container {
    position: relative;
    background: rgba(0,0,0,0.85);
    padding: 40px 35px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,255,255,0.6);
    width: 350px;
    text-align: center;
    color: #fff;
    backdrop-filter: blur(5px);
    animation: fadeInCard 1s forwards;
}

/* Entrance animation */
@keyframes fadeInCard {
    from { opacity:0; transform: translateY(-50px); }
    to { opacity:1; transform: translateY(0); }
}

/* Heading */
h1 {
    margin-bottom: 25px;
    font-size: 26px;
    color: #0ff;
    text-shadow: 0 0 8px #0ff;
}

/* Inputs */
input[type="text"], input[type="password"] {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0 20px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    transition: all 0.3s ease;
}
input[type="text"]:focus, input[type="password"]:focus {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 8px #0ff;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    color: #0ff;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
    cursor: pointer;
    transition: all 0.3s ease;
}
button:hover { background: rgba(0,255,255,0.4); transform: scale(1.05); }

/* Error */
#error { color: #ff4c4c; font-weight: bold; margin-top: 10px; }

/* Footer */
.footer { margin-top: 20px; font-size: 12px; color: #aaa; }

/* Shake animation for wrong login */
@keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-10px); }
    40%,80% { transform: translateX(10px); }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="login-container" id="loginCard">
    <h1>Insider Threat Dashboard</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
    <div class="footer">Secure Login - Cybersecurity Hackathon 2026</div>
</div>

<script>
// Shake function & login logic
function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const card = document.getElementById("loginCard");
    const error = document.getElementById("error");

    if(username === "admin" && password === "1234"){
        window.location = "dashboard.html";
    } else {
        error.innerText = "❌ Invalid Username or Password";
        card.style.animation = "shake 0.5s";
        setTimeout(()=>{ card.style.animation = ""; },500);
    }
}

// Cyber particle network background
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const numParticles = 60;

for(let i=0;i<numParticles;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx: (Math.random()-0.5)*1.5,
        vy: (Math.random()-0.5)*1.5,
        radius: Math.random()*2+1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<particles.length;i++){
        const p = particles[i];
        // Draw particle
        ctx.fillStyle = '#0ff';
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fill();

        // Connect lines
        for(let j=i+1;j<particles.length;j++){
            const q = particles[j];
            const dx = p.x - q.x;
            const dy = p.y - q.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 120){
                ctx.strokeStyle = `rgba(0,255,255,${1-dist/120})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(q.x,q.y);
                ctx.stroke();
            }
        }

        // Move particle
        p.x += p.vx;
        p.y += p.vy;
        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;
    }

    requestAnimationFrame(draw);
}
draw();

// Resize canvas
window.addEventListener('resize',()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
